services:
  app:
    build: .
    container_name: logm_app
    ports:
      - "8080:8080"
    volumes:
      - .:/app:Z
    depends_on:
      - db
    environment:
      DATABASE_URL: postgres://logm:logm@db:5432/logm?sslmode=disable

  db:
    image: postgres:16-alpine
    container_name: logm_db
    restart: always
    environment:
      POSTGRES_USER: logm
      POSTGRES_PASSWORD: logm
      POSTGRES_DB: logm
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
